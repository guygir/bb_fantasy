name: Fantasy Weekly Sync

on:
  schedule:
    # Run daily at 02:00 UTC (after typical game days; catches new boxscores)
    - cron: "0 2 * * *"
    # Also run 11:00 UTC every Friday (weekly extra pass)
    - cron: "0 11 * * 5"
  workflow_dispatch:
    inputs:
      season:
        description: "Season number (default 71)"
        required: false
        default: "71"

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # needed to push player faces
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - name: Install Chrome (for Puppeteer - roster fetch + face sync)
        id: setup-chrome
        uses: browser-actions/setup-chrome@v1
        with:
          # Match what Puppeteer expects on Linux (fonts/libs); avoids flaky launches
          install-dependencies: true

      - name: Fantasy data sync (roster → schedule → boxscores → process → Supabase)
        env:
          BBAPI_LOGIN: ${{ secrets.BBAPI_LOGIN }}
          BBAPI_CODE: ${{ secrets.BBAPI_CODE }}
          BB_PASSWORD: ${{ secrets.BB_PASSWORD }}
          # Optional: copy Cookie header from logged-in browser — avoids reCAPTCHA on login.aspx
          BB_SITE_COOKIES: ${{ secrets.BB_SITE_COOKIES }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          CURRENT_SEASON: ${{ github.event.inputs.season || '71' }}
        run: |
          # Must use the same binary setup-chrome installed (do not use command -v — can pick a different Chrome)
          export PUPPETEER_EXECUTABLE_PATH="${{ steps.setup-chrome.outputs.chrome-path }}"
          echo "PUPPETEER_EXECUTABLE_PATH=$PUPPETEER_EXECUTABLE_PATH"
          "$PUPPETEER_EXECUTABLE_PATH" --version || true
          node scripts/fantasy-weekly-sync.mjs ${{ github.event.inputs.season || '71' }}

      - name: Commit and push player faces
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/player-faces/
          git diff --staged --quiet || (git commit -m "chore: update player faces from sync" && git push)
