name: U21dle Daily

on:
  schedule:
    # Run daily at 00:05 UTC (03:05 Israel summer / 02:05 Israel winter)
    - cron: "5 0 * * *"
  workflow_dispatch: # Allow manual trigger

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required to push
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - name: Generate daily puzzle
        run: node scripts/generate-u21dle-daily.mjs

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet data/u21dle_daily.json; then
            echo "No changes to u21dle_daily.json"
          else
            git add data/u21dle_daily.json
            git commit -m "chore: update U21dle daily puzzle [skip ci]"
            git push
          fi
