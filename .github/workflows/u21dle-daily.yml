name: U21dle Daily

on:
  schedule:
    # Run daily at 00:05 UTC (03:05 Israel summer / 02:05 Israel winter)
    - cron: "5 0 * * *"
  workflow_dispatch:
    inputs:
      date:
        description: "Specific date (YYYY-MM-DD). Leave empty for 3rd next day."
        required: false

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - name: Generate daily puzzle (Supabase)
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          if [ -n "${{ github.event.inputs.date }}" ]; then
            node scripts/generate-u21dle-daily-supabase.mjs "${{ github.event.inputs.date }}"
          else
            node scripts/generate-u21dle-daily-supabase.mjs
          fi
