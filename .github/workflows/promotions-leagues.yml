name: Promotions (League III)

on:
  schedule:
    # Target: Tue/Fri/Sat 22:00 Israel (Asia/Jerusalem). GitHub Actions cron is UTC-only.
    # 20:00 UTC = 22:00 Israel in standard time (UTC+2); in daylight time (UTC+3) it runs 23:00 Israel.
    # For 22:00 Israel during DST instead, use: 0 19 * * 2,5,6
    - cron: "0 20 * * 2,5,6"
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - name: Scrape leagues and update Supabase
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/fetch-promotions-leagues.mjs
