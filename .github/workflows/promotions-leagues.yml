name: Promotions (League III)

on:
  schedule:
    # Target: Tue & Sat ~22:00 Israel. GitHub Actions cron is UTC-only (see promotions page / prior notes for DST).
    - cron: "0 20 * * 2,6"
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - name: Scrape leagues and update Supabase
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/fetch-promotions-leagues.mjs
